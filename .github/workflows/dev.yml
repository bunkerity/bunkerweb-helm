name: Deploy helm chart to dev

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'charts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Chart Before Deploy
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      
    - name: Install yq
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
      
    - name: Run Chart Validation
      run: ./scripts/validate-chart.sh
      
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: success()

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      id: install
    
    - name: Package chart and push it
      env:
        REPO_BEARER_TOKEN: ${{ secrets.REPO_BEARER_TOKEN }}
      run: |
        cd ./charts
        out_dir="$(mktemp -d)"
        helm package ./bunkerweb/ --destination "$out_dir"
        chart_file="$(find "$out_dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
        curl --fail-with-body --show-error --silent --request POST \
          --header "Authorization: Bearer ${REPO_BEARER_TOKEN}" \
          --form "env=dev" \
          --form "chart=@${chart_file};type=application/gzip" \
          "https://repo.bunkerweb.io/api/chart"

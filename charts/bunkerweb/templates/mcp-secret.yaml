{{- if .Values.mcp.enabled -}}
{{- if not .Values.mcp.secrets.existingSecret -}}
{{- if or .Values.mcp.secrets.bunkerwebApiToken .Values.mcp.secrets.bunkerwebBasicUsername .Values.mcp.secrets.websocketToken -}}
apiVersion: v1
kind: Secret
metadata:
  name: mcp-{{ include "bunkerweb.fullname" . }}-secrets
  namespace: {{ include "bunkerweb.namespace" . }}
  labels:
    {{- include "bunkerweb.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
type: Opaque
stringData:
  {{- if .Values.mcp.secrets.bunkerwebApiToken }}
  BUNKERWEB_API_TOKEN: {{ .Values.mcp.secrets.bunkerwebApiToken | quote }}
  {{- end }}
  {{- if .Values.mcp.secrets.bunkerwebBasicUsername }}
  BUNKERWEB_BASIC_USERNAME: {{ .Values.mcp.secrets.bunkerwebBasicUsername | quote }}
  {{- end }}
  {{- if .Values.mcp.secrets.bunkerwebBasicPassword }}
  BUNKERWEB_BASIC_PASSWORD: {{ .Values.mcp.secrets.bunkerwebBasicPassword | quote }}
  {{- end }}
  {{- if .Values.mcp.secrets.websocketToken }}
  BUNKERWEB_WEBSOCKET_TOKEN: {{ .Values.mcp.secrets.websocketToken | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
